<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAI Staff Portal</title>
<style>
body{margin:0;background:#060F1E;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:#0B1A30;border:2px solid #C9A84C;border-radius:8px;padding:40px;width:360px;text-align:center;}
h2{color:#C9A84C;margin-bottom:20px;}
input{width:100%;padding:12px;margin-bottom:12px;background:#060F1E;border:1px solid #C9A84C;color:white;font-size:16px;border-radius:4px;box-sizing:border-box;}
button{width:100%;padding:14px;background:#C9A84C;border:none;color:#0B1A30;font-size:16px;font-weight:bold;border-radius:4px;cursor:pointer;}
#err{color:red;margin-top:10px;display:none;}
#portal{display:none;color:white;text-align:center;padding:40px;}
</style>
</head>
<body>
<div id="login" class="box">
  <h2>IAI STAFF PORTAL</h2>
  <input type="password" id="pw" placeholder="Password">
  <button onclick="login()">LOGIN</button>
  <div id="err">Wrong password</div>
</div>
<div id="portal">
  <h2 style="color:#C9A84C">Welcome to IAI Staff Portal</h2>
  <p style="color:white">You are logged in.</p>
  <br>
  <a href="https://fluffy-bubblegum-95c313.netlify.app" target="_blank" style="color:#C9A84C">Case Management System</a><br><br>
  <a href="https://iahotx.com" target="_blank" style="color:#C9A84C">IAI Website</a><br><br>
  <a href="https://integrityassessments.github.io/iai-portals/iai-attorney-portal.html" target="_blank" style="color:#C9A84C">Attorney Portal</a><br><br>
  <a href="https://classroom.google.com/c/NzYzNDI3NTg0Mzk2" target="_blank" style="color:#C9A84C">Google Classroom</a><br><br>
  <a href="https://integrityassessments.github.io/iai-portals/IAI_Attorney_Tracker.html" target="_blank" style="color:#C9A84C">Attorney Tracker</a>
</div>
<script>
function login(){
  var p = document.getElementById('pw').value;
  if(p === 'iai2024secure'){
    document.getElementById('login').style.display='none';
    document.getElementById('portal').style.display='block';
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pw').value='';
  }
}
document.getElementById('pw').addEventListener('keydown',function(e){
  if(e.key==='Enter') login();
});
</script>
</body>
</html>
